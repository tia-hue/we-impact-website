    function b64ToBytes(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function unlock(password) {
      var buf = b64ToBytes(DATA);
      var salt = buf.slice(0, 16);
      var iv = buf.slice(16, 28);
      var ct = buf.slice(28);
      var enc = new TextEncoder();
      var keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      var key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 310000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
      );
      var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
      return new TextDecoder().decode(pt);
    }

    document.getElementById("unlock-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var pw = document.getElementById("pw").value;
      var err = document.getElementById("err");
      err.style.display = "none";
      unlock(pw).then(function (html) {
        document.getElementById("financials-content").innerHTML = html;
        document.getElementById("financials-content").style.display = "block";
        document.getElementById("lock").style.display = "none";
      }).catch(function () {
        err.style.display = "block";
      });
    });

    document.querySelectorAll("[data-year]").forEach(function (el) {
      el.textContent = new Date().getFullYear();
    });
  })();
